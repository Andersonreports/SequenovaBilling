    // ── Lazy-load an external script once ──
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) return resolve();
        const s = document.createElement('script');
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Failed to load ' + src));
        document.head.appendChild(s);
      });
    }

    // ── OCR fallback: extract quote data from a PDF with no embedded data ──
    async function extractViaOCR(file, btn) {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js');
      if (!window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }

      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      const lines = [];
      const pages = [];
      const worker = await window.Tesseract.createWorker('eng');

      try {
        for (let p = 1; p <= pdf.numPages; p++) {
          if (btn) btn.textContent = `OCR page ${p}/${pdf.numPages}…`;
          const page = await pdf.getPage(p);
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

          const { data: ocr } = await worker.recognize(canvas, {}, { blocks: true, text: true });

          // Tesseract.js v5 nests word data under blocks > paragraphs > lines > words.
          // Fall back to a flat data.words array in case an older build is loaded.
          let words = [];
          (ocr.blocks || []).forEach(block => {
            (block.paragraphs || []).forEach(para => {
              (para.lines || []).forEach(line => {
                (line.words || []).forEach(w => words.push(w));
              });
            });
          });
          if (!words.length && Array.isArray(ocr.words)) words = ocr.words;

          words = words
            .filter(w => w.text && w.text.trim())
            .map(w => ({ text: w.text.trim(), x0: w.bbox.x0, x1: w.bbox.x1, y0: w.bbox.y0, y1: w.bbox.y1 }))
            .sort((a, b) => a.y0 - b.y0 || a.x0 - b.x0);

          const pageIdx = p - 1;
          pages.push({ cw: canvas.width, words });

          let cur = null;
          words.forEach(w => {
            const h = w.y1 - w.y0;
            if (cur && Math.abs(w.y0 - cur.y0) < h * 0.6) {
              cur.words.push(w);
              cur.x1 = Math.max(cur.x1, w.x1);
              cur.y1 = Math.max(cur.y1, w.y1);
            } else {
              cur = { words: [w], x0: w.x0, x1: w.x1, y0: w.y0, y1: w.y1, cw: canvas.width, page: pageIdx };
              lines.push(cur);
            }
          });
        }
      } finally {
        await worker.terminate();
      }

      lines.forEach(l => {
        l.words.sort((a, b) => a.x0 - b.x0);
        l.text = l.words.map(w => w.text).join(' ');
      });

      if (!lines.length) {
        throw new Error('OCR could not detect any text in this PDF.');
      }

      console.debug('[Load PDF] OCR text:\n' + lines.map(l => l.text).join('\n'));
      return parseOCRLines(lines, pages);
    }

    // ── Parse OCR'd lines (with word bounding boxes) into quote data ──
    function parseOCRLines(lines, pages) {
      const data = {
        qNo: '', qDate: '',
        bName: '', bAddr: '', bGST: '', bAttn: '', bPhone: '', bEmail: '',
        sName: '', sInst: '', sAddr: '', sAttn: '', sPhone: '', sEmail: '',
        tCost: '0', tGST: '18',
        termsType: 'other', termsText: '',
        signatoryName: '',
        items: []
      };
      const num = s => { const m = String(s || '').replace(/,/g, '').match(/-?\d+(\.\d+)?/); return m ? m[0] : ''; };

      // Quote No / Date — "QUOTATION Quote", "No: <val>" and "Date: <val>" can
      // each land on their own separate OCR "line" objects, so join all the
      // lines near the top of page 1 before matching.
      {
        const topText = lines.filter(l => l.page === 0 && l.y0 < 400).map(l => l.text).join(' ');
        const m1 = topText.match(/Quote\s*No\s*[:.]?\s*(\S+)/i);
        if (m1 && !/^[-—_.]+$/.test(m1[1]) && !/^Date/i.test(m1[1])) data.qNo = m1[1].replace(/[^A-Za-z0-9-]/g, '');
        const m2 = topText.match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/);
        if (m2) data.qDate = `${m2[3]}-${m2[2].padStart(2, '0')}-${m2[1].padStart(2, '0')}`;
      }
      if (!data.qDate) {
        const dLine = lines.find(l => /Date\s*[:.]?\s*\d{1,2}[.\/-]\d{1,2}[.\/-]\d{4}/i.test(l.text));
        if (dLine) {
          const m2 = dLine.text.match(/(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})/);
          if (m2) data.qDate = `${m2[3]}-${m2[2].padStart(2, '0')}-${m2[1].padStart(2, '0')}`;
        }
      }

      // Bill To / Ship To block — anchor on whichever header OCR managed to read
      let headerIdx = lines.findIndex(l => /Bill\s*To/i.test(l.text));
      if (headerIdx === -1) headerIdx = lines.findIndex(l => /Ship\s*To/i.test(l.text));
      if (headerIdx === -1) {
        // OCR missed the "Bill To"/"Ship To" header text entirely — fall back to
        // anchoring just above the first "Address:" line so the address fields
        // still get extracted (the name lines above it will be missed).
        const addrIdx = lines.findIndex(l => /Add?ress\s*[:.]?/i.test(l.text));
        if (addrIdx > 0) headerIdx = addrIdx - 1;
      }

      let itemHeaderIdx = lines.findIndex((l, i) => (headerIdx === -1 || i > headerIdx) && /Description/i.test(l.text));
      if (itemHeaderIdx === -1) {
        itemHeaderIdx = lines.findIndex((l, i) => (headerIdx === -1 || i > headerIdx) && /Sr\.?\s*No/i.test(l.text) && /Cat/i.test(l.text));
      }
      if (itemHeaderIdx === -1) {
        // OCR sometimes garbles "Description"/"Sr.No" beyond recognition but
        // still gets other column headers right.
        itemHeaderIdx = lines.findIndex((l, i) => (headerIdx === -1 || i > headerIdx) && /HSN|Pack\s*size|Unit\s*price|QTY\.?|Cat\.?\s*#/i.test(l.text));
      }
      if (itemHeaderIdx === -1) {
        // OCR sometimes drops the leading character of "Description" (reading
        // it as "escription") and "Unit price" (reading it as "nit price").
        itemHeaderIdx = lines.findIndex((l, i) => (headerIdx === -1 || i > headerIdx) && /scription|nit\s*price/i.test(l.text));
      }
      // Last-resort bound: address blocks in this template are at most ~8
      // lines of content below the "Bill To"/"Ship To" header, so even if the
      // items-table header was never recognized, don't let the address scan
      // run past that into the table/footer.
      const addrEnd = itemHeaderIdx === -1
        ? (headerIdx === -1 ? lines.length : Math.min(lines.length, headerIdx + 9))
        : itemHeaderIdx;

      if (headerIdx !== -1) {
        const cw = lines[headerIdx].cw;
        const midX = cw / 2;
        const billLines = [], shipLines = [];
        // If itemHeaderIdx wasn't found (OCR missed the table header), addrEnd
        // can run all the way to the end of the document — stop the address
        // block as soon as we hit the items-table header, footer/terms/bank
        // sections, a page change, or a large vertical gap, so address fields
        // don't get polluted with table/footer text.
        const STOP_RE = /Description|HSN|Unit\s*price|Pack\s*size|QTY\.?|Cat\.?\s*#|Terms\s*&?\s*Conditions|Bank\s*Details|Yours\s*Truly|Amount\s*in\s*Word|Sub\s*-?\s*total|Transport|GST\s*No|^Sequenova\s*Riverhead\s*Biosciences\s*Solutions$|\d{1,3}(?:,\d{2,3})+|\|\s*\|/i;
        let prevY1 = lines[headerIdx].y1;
        for (let i = headerIdx; i < addrEnd; i++) {
          const l = lines[i];
          let words = l.words;
          if (i === headerIdx) {
            // Strip "Bill To"/"Ship To" header tokens, which OCR sometimes
            // merges into the same line as the first row of address content.
            words = words.filter(w => !/^(Bill|Ship|To)$/i.test(w.text));
          } else {
            const t = l.text.trim();
            if (/^(Bill|Ship)\s*To$/i.test(t)) continue;
            if (l.page !== lines[headerIdx].page) break;
            if (STOP_RE.test(t)) break;
            if (l.y0 - prevY1 > 150) break;
            if (/^[^A-Za-z0-9]*$/.test(t)) continue;
          }
          if (!words.length) continue;
          const leftWords = words.filter(w => w.x0 < midX);
          const rightWords = words.filter(w => w.x0 >= midX);
          if (leftWords.length) billLines.push(leftWords.map(w => w.text).join(' '));
          if (rightWords.length) shipLines.push(rightWords.map(w => w.text).join(' '));
          prevY1 = l.y1;
        }
        parseAddressBlock(billLines, data, 'b');
        parseAddressBlock(shipLines, data, 's');
      }

      // Items table — reconstruct rows from word bounding boxes (column cells can
      // span multiple OCR "lines" when descriptions wrap, so anchor rows on the
      // Sr.No column instead of treating each OCR line as a row).
      if (itemHeaderIdx !== -1) {
        const pageNum = lines[itemHeaderIdx].page;
        // OCR frequently misreads "SGST" (e.g. "scst"), but "CGST"/"IGST" tend
        // to survive — anchor on those instead.
        const header2Idx = lines.findIndex((l, idx) => idx > itemHeaderIdx && l.page === pageNum && /CGST/i.test(l.text) && /IGST/i.test(l.text));
        const yTop = header2Idx !== -1 ? lines[header2Idx].y1 : lines[itemHeaderIdx].y1;
        // Anchor the bottom of the items table on "Subtotal", or — if OCR
        // missed that row entirely — on the Transportation Cost / Amount in
        // Words rows that always follow it, so the last item's row doesn't
        // bleed into the footer/letterhead text below.
        const bottomIdx = lines.findIndex((l, idx) => idx > itemHeaderIdx && l.page === pageNum && /Sub\s*-?\s*total|Transportatio|Amount\s*in\s*Word/i.test(l.text));
        const yBottom = bottomIdx !== -1 ? lines[bottomIdx].y0 : Infinity;

        const cw = lines[itemHeaderIdx].cw;
        const contentLeft = cw * 40 / 794, contentWidth = cw * 714 / 794;
        const COLS = {
          sr: [0, 0.04], cat: [0.04, 0.12], desc: [0.12, 0.33], hsn: [0.33, 0.41], pack: [0.41, 0.48],
          price: [0.48, 0.57], qty: [0.57, 0.62], sgst: [0.72, 0.81], cgst: [0.81, 0.90], igst: [0.90, 1.0]
        };
        const colX = name => [contentLeft + contentWidth * COLS[name][0], contentLeft + contentWidth * COLS[name][1]];

        const pageWords = (pages[pageNum] || { words: [] }).words;
        const tableWords = pageWords.filter(w => {
          const yc = (w.y0 + w.y1) / 2;
          return yc > yTop && yc < yBottom;
        });

        const [, srColEnd] = colX('sr');
        const markers = tableWords
          .filter(w => w.x0 < srColEnd + 10 && /^[0-9lI]{1,3}$/.test(w.text))
          .sort((a, b) => a.y0 - b.y0);

        // Drop spurious markers far below the real table (e.g. a digit-like
        // token picked up from the "Amount in Words"/footer text), based on
        // an abnormally large gap compared to the row spacing seen so far.
        if (markers.length > 2) {
          const ycOf = m => (m.y0 + m.y1) / 2;
          const gaps = [];
          for (let k = 1; k < markers.length; k++) gaps.push(ycOf(markers[k]) - ycOf(markers[k - 1]));
          for (let k = 1; k < gaps.length; k++) {
            const avgPrev = gaps.slice(0, k).reduce((a, b) => a + b, 0) / k;
            if (gaps[k] > avgPrev * 1.8 + 20) {
              markers.length = k + 1;
              break;
            }
          }
        }

        // OCR sometimes mistakes table grid lines for stray "|"/":" characters —
        // strip these punctuation-only artifacts from cell text.
        const isBorderNoise = t => /^[|¦❘!:.]{1,3}$/.test(t);

        // Group a cell's words into visual lines (by y-proximity) before
        // ordering left-to-right, so multi-line cells read in the correct
        // word order even when raw OCR y0 values jitter slightly.
        const groupIntoLines = words => {
          const sorted = [...words].sort((a, b) => a.y0 - b.y0);
          const wlines = [];
          sorted.forEach(w => {
            const h = w.y1 - w.y0;
            let wl = wlines.find(l => Math.abs(l.y - w.y0) < h * 0.6);
            if (!wl) { wl = { y: w.y0, words: [] }; wlines.push(wl); }
            wl.words.push(w);
          });
          wlines.sort((a, b) => a.y - b.y);
          return wlines.map(wl => wl.words.sort((x, y) => x.x0 - y.x0));
        };

        const cellText = (words, name) => {
          const [a, b] = colX(name);
          const cellWords = words.filter(w => w.x0 >= a - 5 && w.x0 < b + 5 && !isBorderNoise(w.text));
          return groupIntoLines(cellWords).map(wl => wl.map(w => w.text).join(' ')).join(' ').trim();
        };

        // GST % cells read like "5%". When the rate is 0% the template only
        // shows the rupee amount (e.g. "₹0", which OCR often garbles into a
        // bare number) with no "%" sign at all — treat that as 0 rather than
        // misreading the garbled amount as a percentage.
        const pctOf = txt => {
          const m = txt.match(/(\d+(?:\.\d+)?)\s*%/);
          return m ? parseFloat(m[1]) : 0;
        };

        const rows = [];
        markers.forEach((m, idx) => {
          const yc = (m.y0 + m.y1) / 2;
          const prevYc = idx > 0 ? (markers[idx - 1].y0 + markers[idx - 1].y1) / 2 : -Infinity;
          const nextYc = idx < markers.length - 1 ? (markers[idx + 1].y0 + markers[idx + 1].y1) / 2 : Infinity;
          const rowTop = idx === 0 ? -Infinity : (prevYc + yc) / 2;
          const rowBottom = idx === markers.length - 1 ? yBottom : (yc + nextYc) / 2;
          const rowWords = tableWords.filter(w => { const wyc = (w.y0 + w.y1) / 2; return wyc >= rowTop && wyc < rowBottom; });

          // Cat#, HSN, Pack size, Unit price, QTY, and the GST % values are
          // single-line cells top-aligned with the Sr.No marker, so prefer
          // the words on that same visual line — this avoids picking up
          // digits from the Subtotal row or adjacent wrapped description
          // lines that fall within the row's overall y-range.
          const markerH = m.y1 - m.y0;
          const topWords = rowWords.filter(w => Math.abs(((w.y0 + w.y1) / 2) - yc) < markerH * 0.7);

          const desc = cellText(rowWords, 'desc');
          // Cat# codes are "S" + 6 digits; OCR commonly misreads the leading
          // "S" as "$".
          const cat = (cellText(topWords, 'cat') || cellText(rowWords, 'cat')).replace(/^\$(\d{6})$/, 'S$1');
          const hsn = cellText(topWords, 'hsn') || cellText(rowWords, 'hsn');
          const pack = cellText(topWords, 'pack') || cellText(rowWords, 'pack') || '1 Unit';
          const price = num(cellText(topWords, 'price') || cellText(rowWords, 'price'));
          const qty = num(cellText(topWords, 'qty') || cellText(rowWords, 'qty')) || '1';
          const sgstTxt = cellText(topWords, 'sgst') || cellText(rowWords, 'sgst');
          const cgstTxt = cellText(topWords, 'cgst') || cellText(rowWords, 'cgst');
          const igstTxt = cellText(topWords, 'igst') || cellText(rowWords, 'igst');

          if (desc || cat) {
            rows.push({
              cat, desc, hsn, pack,
              price: parseFloat(price) || 0, qty: parseFloat(qty) || 1,
              sgst: pctOf(sgstTxt), cgst: pctOf(cgstTxt), igst: pctOf(igstTxt)
            });
          }
        });

        // Below the items table the page contains the company's letterhead
        // address and the "Amount in Words" line; if a stray Sr.No-like
        // marker is found there it produces a bogus extra row. Detect and
        // drop such rows, salvaging any price/qty they picked up for the
        // preceding real item if that item's price wasn't found.
        const SPURIOUS_RE = /Sequenova|Riverhead|Amount\s*in\s*Word|Rupees\s+\w+\s+(Lakh|Crore|Thousand|Hundred)/i;
        rows.forEach((row, idx) => {
          const text = `${row.cat} ${row.desc} ${row.hsn} ${row.pack}`;
          if (SPURIOUS_RE.test(text)) {
            const prev = rows[idx - 1];
            if (prev && !prev.price && row.price) {
              prev.price = row.price;
              prev.qty = row.qty;
            }
            row.spurious = true;
          }
        });
        rows.filter(row => !row.spurious).forEach(row => {
          data.items.push({ id: data.items.length + 1, ...row });
        });
      }

      // Transportation cost / GST — the label sits in the left cell of the
      // row and the amount in the right cell, which OCR usually reads as a
      // separate "line" on the same row. The "₹" currency symbol is often
      // misread as a stray leading digit (e.g. "Transportation Cost 2
      // 14,999"), so take the last (largest) number found rather than the
      // first.
      const lastNum = s => {
        const matches = String(s || '').replace(/,/g, '').match(/-?\d+(\.\d+)?/g);
        return matches ? matches[matches.length - 1] : '';
      };
      const rowValue = line => {
        const v = lastNum(line.text);
        if (v) return v;
        const h = line.y1 - line.y0;
        const sameRow = lines
          .filter(l => l !== line && l.page === line.page && Math.abs(l.y0 - line.y0) < h * 0.6 && l.x0 > line.x0)
          .sort((a, b) => a.x0 - b.x0);
        for (const l of sameRow) {
          const m = lastNum(l.text);
          if (m) return m;
        }
        return '';
      };
      let tcLine = lines.find(l => /Transport\w*\s*Cost/i.test(l.text));
      if (!tcLine) tcLine = lines.find(l => /Transport/i.test(l.text) && /Cost/i.test(l.text));
      if (tcLine) {
        let v = rowValue(tcLine);
        if (!v) {
          // The amount may have ended up on its own line right after the label.
          const idx = lines.indexOf(tcLine);
          for (let k = idx + 1; k < Math.min(idx + 3, lines.length); k++) {
            v = lastNum(lines[k].text);
            if (v) break;
          }
        }
        data.tCost = v || '0';
      }
      let tgLine = lines.find(l => /GST/i.test(l.text) && /Transport/i.test(l.text));
      if (tgLine) {
        let m = tgLine.text.match(/(\d+(?:\.\d+)?)\s*%/);
        if (!m) {
          const idx = lines.indexOf(tgLine);
          for (let k = idx + 1; k < Math.min(idx + 3, lines.length); k++) {
            m = lines[k].text.match(/(\d+(?:\.\d+)?)\s*%/);
            if (m) break;
          }
        }
        if (m) data.tGST = m[1];
      }

      // Terms & Conditions
      const termsIdx = lines.findIndex(l => /Terms.*Conditions/i.test(l.text));
      if (termsIdx !== -1) {
        const bankIdx = lines.findIndex((l, idx) => idx > termsIdx && /Bank\s*Details|Beneficiary/i.test(l.text));
        const end2 = bankIdx === -1 ? lines.length : bankIdx;
        data.termsText = lines.slice(termsIdx + 1, end2).map(l => l.text.trim()).filter(Boolean).join('\n');
      }

      // Signatory: normally the line above "Thank You for Your Business",
      // skipping the "Yours Truly," and company-name lines that always
      // precede it. OCR sometimes merges all of "Yours Truly," + company
      // name + signatory name + "Thank You..." into a single line, so try
      // stripping those known parts from that merged line first.
      const tyIdx = lines.findIndex(l => /Thank\s*You.*Business/i.test(l.text));
      // The signatory name is typically prefixed "Mr./Mrs./Ms./Dr." — prefer
      // matching that even when the line is merged with bank-address text
      // (the signatory block is right-aligned next to the bank details, so
      // OCR can place both on the same visual line).
      const NAME_RE = /(Mr|Mrs|Ms|Dr)\.?\s+[A-Za-z][\w.]*(\s+[A-Za-z][\w.]*)*\s*$/;
      if (tyIdx !== -1) {
        let tyText = lines[tyIdx].text.trim()
          .replace(/Thank\s*You.*$/i, '')
          .replace(/^.*Sequenova\s*Riverhead\s*Biosciences\s*Solutions/i, '')
          .replace(/^Yours\s*Truly,?/i, '')
          .trim();
        const tyM = tyText.match(NAME_RE);
        if (tyM) {
          data.signatoryName = tyM[0].trim();
        } else if (tyText) {
          data.signatoryName = tyText;
        } else {
          for (let k = tyIdx - 1; k >= 0; k--) {
            const t = lines[k].text.trim();
            if (!t) continue;
            if (/Yours\s*Truly/i.test(t) || /Sequenova\s*Riverhead/i.test(t)) continue;
            const m = t.match(NAME_RE);
            if (m) { data.signatoryName = m[0].trim(); break; }
            if (/\d/.test(t) || /,\s*$/.test(t)) continue;
            data.signatoryName = t;
            break;
          }
        }
      }
      // Some layouts have no "Thank You for Your Business" line at all — the
      // signatory name simply follows "Yours Truly," and the company name.
      if (!data.signatoryName) {
        const ytIdx = lines.findIndex(l => /Yours\s*Truly/i.test(l.text));
        if (ytIdx !== -1) {
          for (let k = ytIdx + 1; k < lines.length; k++) {
            let t = lines[k].text.trim();
            if (!t) continue;
            t = t.replace(/^.*Sequenova\s*Riverhead\s*Biosciences\s*Solutions\s*/i, '').trim();
            if (!t || /Sequenova\s*Riverhead/i.test(t)) continue;
            t = t.replace(/Thank\s*You.*$/i, '').trim();
            if (!t) continue;
            const m = t.match(NAME_RE);
            data.signatoryName = m ? m[0].trim() : t;
            break;
          }
        }
      }

      return data;
    }

    // ── Clean up an OCR-read GSTIN against its known 15-character format ──
    // Format: 2 digits (state code) + 5 letters + 4 digits + 1 letter +
    // 1 alphanumeric + "Z" (fixed) + 1 alphanumeric (checksum). OCR commonly
    // confuses O/0, I/L/1, S/5, B/8 and Z/2 — fix those up per-position.
    function normalizeGSTIN(val) {
      let s = val.toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (s.length !== 15) return val.trim();
      const toDigit = c => ({ O: '0', D: '0', Q: '0', I: '1', L: '1', Z: '2', S: '5', B: '8' }[c] || c);
      const toLetter = c => ({ '0': 'O', '1': 'I', '2': 'Z', '5': 'S', '8': 'B' }[c] || c);
      const chars = s.split('');
      for (let i = 0; i <= 1; i++) chars[i] = /[0-9]/.test(chars[i]) ? chars[i] : toDigit(chars[i]);
      for (let i = 2; i <= 6; i++) chars[i] = /[A-Z]/.test(chars[i]) ? chars[i] : toLetter(chars[i]);
      for (let i = 7; i <= 10; i++) chars[i] = /[0-9]/.test(chars[i]) ? chars[i] : toDigit(chars[i]);
      chars[11] = /[A-Z]/.test(chars[11]) ? chars[11] : toLetter(chars[11]);
      chars[13] = 'Z';
      return chars.join('');
    }

    // ── Split an address-table column's lines into labeled fields ──
    // Labels can appear anywhere within a line (not just at the start), since
    // OCR sometimes merges adjacent fields onto one line.
    function parseAddressBlock(linesArr, data, prefix) {
      const cleaned = linesArr.map(t => t.trim()).filter(Boolean);
      if (!cleaned.length) return;
      const text = cleaned.join('\n');
      const labelRe = /(Add?ress|GST\s*I?N|Attention|Phone\s*(?:Number)?|E[- ]?mail)\s*[:.]?\s*/gi;
      const matches = [...text.matchAll(labelRe)];
      const nameText = matches.length ? text.slice(0, matches[0].index) : text;
      const nameLines = nameText.split('\n').map(s => s.trim()).filter(Boolean);

      // The last field's value can run on into the items table header if OCR
      // merged that header into the same line — cut it off at the first
      // table-header keyword.
      const HEADER_STOP = /\b(Sr\.?(\s*No\.?)?|Cat\.?\s*#|Description|HSN|Pack(\s*size)?|Unit\s*price|QTY\.?|Total(\s*(Cost|GST))?|GST|SGST|CGST|IGST)\b/i;

      matches.forEach((m, idx) => {
        const label = m[1].toLowerCase().replace(/\s+/g, '');
        const start = m.index + m[0].length;
        const end = idx + 1 < matches.length ? matches[idx + 1].index : text.length;
        let val = text.slice(start, end).replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
        const stopAt = val.search(HEADER_STOP);
        if (stopAt > 0) val = val.slice(0, stopAt).trim();
        if (label.startsWith('add')) data[prefix + 'Addr'] = ((data[prefix + 'Addr'] || '') + ' ' + val).trim();
        else if (label.startsWith('gst')) data.bGST = normalizeGSTIN(val);
        else if (label.startsWith('att')) data[prefix + 'Attn'] = val;
        else if (label.startsWith('phone')) data[prefix + 'Phone'] = val;
        else if (label.startsWith('email')) data[prefix + 'Email'] = val;
      });

      if (prefix === 'b') {
        data.bName = nameLines[0] || '';
      } else {
        data.sName = nameLines[0] || '';
        data.sInst = nameLines.slice(1).join(' ') || '';
      }
    }

    // ── Load PDF: extract embedded JSON tag, or OCR-fallback for older PDFs ──
    async function handlePDFLoad(file) {
      const btn = document.querySelector('.btn-load-pdf');
      const restoreBtn = () => {
        btn.disabled = false;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Load PDF';
      };
      btn.disabled = true;
      btn.textContent = 'Reading…';
      try {
        const buf = await file.arrayBuffer();
        // Scan the tail of the file (JSON payload is always small)
        const tail = buf.byteLength > 16384 ? buf.slice(buf.byteLength - 16384) : buf;
        const text = new TextDecoder('latin1').decode(tail);
        const m = text.match(/%SeqBillData:([A-Za-z0-9+/=]+)/);
        if (m) {
          const data = JSON.parse(decodeURIComponent(atob(m[1])));
          populateFormFromData(data);
          restoreBtn();
          return;
        }

        // Fallback: OCR extraction for PDFs generated before this feature existed
        showToast('No embedded data found — extracting via OCR (older PDF). This may take a minute…');
        const data = await extractViaOCR(file, btn);
        const hasData = data.qNo || data.bName || data.sName || data.bAddr || data.sAddr || data.items.length;
        if (!hasData) {
          showToast('OCR ran but could not recognize the quote layout in this PDF. Try a clearer/non-scanned copy.', true);
          return;
        }
        populateFormFromData(data, 'Extracted via OCR — please double-check all fields, especially numbers and GST rates.');
      } catch (err) {
        showToast('Failed to load PDF: ' + err.message, true);
      } finally {
        restoreBtn();
      }
    }

    // ── Toast notification ──
    function showToast(msg, isError) {
      const t = document.createElement('div');
      t.className = 'sqn-toast' + (isError ? ' sqn-toast-err' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => { t.classList.add('sqn-toast-in'); });
      setTimeout(() => {
        t.classList.remove('sqn-toast-in');
        t.addEventListener('transitionend', () => t.remove(), { once: true });
      }, 3200);
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('qDate').value = new Date().toISOString().split('T')[0];
      renderItemCards();
      renderPreview();
      // Prevent mouse wheel from changing number input values
      document.addEventListener('wheel', () => {
        if (document.activeElement?.type === 'number') document.activeElement.blur();
      }, { passive: true });
      // Autocomplete: show on input, hide on blur/scroll/click-outside
      const fp = document.querySelector('.form-panel');
      fp.addEventListener('input', e => {
        const id = e.target.id;
        if (AC_FIELDS.includes(id)) showAC(e.target, acSuggest(id, e.target.value));
      });
      fp.addEventListener('blur', e => {
        if (AC_FIELDS.includes(e.target.id)) setTimeout(hideAC, 160);
      }, true);
      fp.addEventListener('scroll', hideAC, { passive: true });
      document.addEventListener('mousedown', e => {
        if (_acEl && !_acEl.contains(e.target)) hideAC();
      });
    });
  </script>
</body>

</html>
