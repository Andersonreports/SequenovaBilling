<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no,address=no,email=no">
  <title>Sequenova Bill</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #edf2f7; color: #2d3748; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── App header ── */
    .app-header {
      background: #ffffff; color: #172033; padding: 12px 26px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 4px solid #26328c; border-bottom: 1px solid #d8e0ea;
      box-shadow: 0 6px 18px rgba(29, 41, 57, 0.08); flex-shrink: 0;
    }
    .hdr-left { display: flex; align-items: center; gap: 14px; }
    .hdr-logo-img {
      width: 44px; height: 44px; object-fit: contain;
      background: #fff; border: 1px solid #d8e0ea; border-radius: 8px; padding: 4px;
      box-shadow: 0 2px 6px rgba(29, 41, 57, 0.08);
    }
    .app-header h1 { font-size: 1rem; font-weight: 750; letter-spacing: .1px; }
    .app-header p  { font-size: 0.72rem; color: #667085; margin-top: 2px; }
    .btn-print {
      background: #16833a; color: white; border: 1px solid #0f6e2f;
      padding: 8px 17px; border-radius: 8px; cursor: pointer;
      font-size: 0.81rem; font-weight: 700;
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 2px 5px rgba(22, 131, 58, .18);
      transition: background .18s, transform .18s, box-shadow .18s;
    }
    .btn-print:hover { background: #0f6e2f; transform: translateY(-1px); box-shadow: 0 5px 12px rgba(22, 131, 58, .22); }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left panel ── */
    .form-panel {
      width: 430px; min-width: 350px; background: white;
      overflow-y: auto; padding: 16px 15px;
      border-right: 1px solid #e2e8f0; flex-shrink: 0;
    }
    .sec-title {
      color: #c84b00; font-size: 0.67rem; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      margin: 18px 0 9px; padding-bottom: 4px; border-bottom: 1px solid #fbd38d;
    }
    .sec-title:first-child { margin-top: 2px; }

    .fg { margin-bottom: 9px; }
    .fg label { display: block; font-size: 0.73rem; color: #4a5568; font-weight: 500; margin-bottom: 3px; }
    .fg input, .fg textarea {
      width: 100%; border: 1px solid #cbd5e0; border-radius: 5px;
      padding: 6px 9px; font-size: 0.79rem; color: #2d3748; background: white;
      transition: border-color .15s, box-shadow .15s;
    }
    .fg input:focus, .fg textarea:focus {
      outline: none; border-color: #4299e1; box-shadow: 0 0 0 2px rgba(66,153,225,.2);
    }
    .fg textarea { resize: vertical; min-height: 56px; font-family: inherit; }
    .frow { display: flex; gap: 8px; }
    .frow .fg { flex: 1; }

    /* Item cards */
    .item-card {
      border: 1px solid #e2e8f0; border-radius: 7px;
      padding: 11px 11px 9px; margin-bottom: 10px; background: #fafafa;
    }
    .item-card-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .item-num { font-size: 0.78rem; font-weight: 700; color: #2d3748; }
    .btn-rem {
      background: #fc8181; color: white; border: none;
      width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
      font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .btn-rem:hover { background: #e53e3e; }
    .empty-msg { font-size: 0.75rem; color: #a0aec0; text-align: center; padding: 12px 0; font-style: italic; }

    .btn-add {
      width: 100%; background: #1a237e; color: white; border: none;
      padding: 8px 0; border-radius: 6px; cursor: pointer;
      font-size: 0.8rem; font-weight: 600; transition: background .18s;
    }
    .btn-add:hover { background: #283593; }

    /* ── Preview panel ── */
    .preview-panel {
      flex: 1; display: flex; flex-direction: column; background: #d1d9e0; overflow: hidden;
    }
    .preview-title-bar {
      background: #ffffff; color: #26328c; font-family: 'Segoe UI', sans-serif;
      font-size: 0.88rem; font-weight: 750; letter-spacing: 0.2px;
      padding: 10px 22px; flex-shrink: 0; border-bottom: 1px solid #d8e0ea;
    }
    .preview-scroll {
      flex: 1; overflow-y: auto; padding: 22px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ════ QUOTATION PAGES ════ */
    .quote-doc { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .quote-page {
      background: white; width: calc(100% - 32px); min-width: 794px; min-height: 1123px;
      padding: 34px 38px 42px;
      font-family: 'Times New Roman', Times, serif; font-size: 15px; line-height: 1.45;
      box-shadow: 0 4px 28px rgba(0,0,0,0.18); color: #111;
      margin-bottom: 22px; position: relative;
    }
    .page-label {
      position: absolute; top: -22px; left: 0;
      font-family: 'Segoe UI', sans-serif; font-size: 0.7rem;
      color: #6b7280; font-weight: 600; letter-spacing: 0.5px;
    }

    /* Doc header */
    .dh { margin-bottom: 28px; }
    .dh-row1 { display: grid; grid-template-columns: 1fr auto 1fr; align-items: baseline; margin-bottom: 16px; }
    .dh-row2 { display: grid; grid-template-columns: 1fr 1fr; align-items: start; }
    .dh-company { font-family: Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .2px; text-transform: uppercase; white-space: nowrap; justify-self: start; }
    .doc-logo-img { width: 100px; max-height: 75px; object-fit: contain; grid-column: 1; justify-self: start; }
    .dh-title { text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 5px; }
    .dh-qno   { font-size: 15px; font-weight: bold; text-align: right; justify-self: end; }

    /* Seller info box */
    .seller-box { grid-column: 2; margin: 0 0 0 10px; font-size: 15px; line-height: 1.35; text-align: left; }
    /* Suppress browser auto-detected link styling across the whole document */
    .quote-page a { text-decoration: none !important; color: inherit !important; pointer-events: none; }
    .seller-name { font-size: 16px; font-weight: bold; margin-bottom: 2px; }
    .info-line {
      display: block; margin: 2px 0;
    }
    .info-line strong { margin-right: 3px; white-space: nowrap; }
    .info-line span { overflow-wrap: anywhere; }
    .info-inline { display: flex; flex-wrap: wrap; gap: 22px; margin-top: 2px; }

    /* Address table */
    .addr-tbl { width: 100%; border-collapse: collapse; margin-bottom: 12px; table-layout: fixed; }
    .addr-tbl a { text-decoration: none; color: inherit; pointer-events: none; }
    .addr-tbl th { border: 1.5px solid #222; padding: 6px 10px; background: #f2f2f2; font-size: 16px; font-weight: bold; text-align: center; }
    .addr-tbl td { border: 1.5px solid #222; padding: 12px 12px; vertical-align: top; font-size: 15px; line-height: 1.55; }
    .addr-tbl .date-cell { vertical-align: middle; text-align: center; font-size: 15px; line-height: 2; }
    .bill-company { display: block; white-space: nowrap; font-size: 13.4px; line-height: 1.35; margin-bottom: 4px; }

    /* Items table */
    .it { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 13px; }
    .it th, .it td { border: 1.5px solid #222; padding: 8px 7px; text-align: center; }
    .it th { background: #f0f0f0; font-weight: bold; }
    .it .item-row td { background: #fde4c5; }
    .it .sub-row td  { background: #dce8f8; font-weight: bold; }
    .it .tot-row td  { background: #ffeb3b; font-weight: bold; font-size: 15px; }
    .it td.left      { text-align: left; }
    .ph { color: #bbb; font-style: italic; }

    /* Amount in words */
    .amt-words { margin: 16px 0 22px; font-size: 15px; text-align: center; }

    /* Page 2 */
    .p2-hdr { margin-bottom: 16px; }
    .p2-hdr .dh-row1 { margin-bottom: 12px; }
    .p2-logo-img { width: 100px; max-height: 75px; object-fit: contain; flex-shrink: 0; }
    .terms-sec { font-size: 15px; line-height: 1.75; margin-bottom: 22px; font-family: Calibri, 'Segoe UI', Arial, sans-serif; }
    .terms-sec h3 { font-size: 24px; margin-bottom: 6px; font-family: Calibri, 'Segoe UI', Arial, sans-serif; font-weight: bold; }
    .bank-sec { font-size: 15px; line-height: 1.85; margin-bottom: 24px; font-weight: bold; font-family: Calibri, 'Segoe UI', Arial, sans-serif; }
    .bank-sec h3 { font-size: 24px; margin-bottom: 6px; font-family: Calibri, 'Segoe UI', Arial, sans-serif; }
    .sig { display: table; margin-left: auto; margin-top: 42px; font-size: 15px; line-height: 1.9; text-align: left; font-family: Calibri, 'Segoe UI', Arial, sans-serif; }
    .ty  { text-align: center; margin-top: 58px; font-size: 25px; color: #bbb; font-style: italic; }

    /* ── Print ── */
    @media print {
      .form-panel, .app-header, .page-label, .preview-title-bar { display: none !important; }
      body { background: white; height: auto; overflow: visible; }
      .main { display: block; overflow: visible; }
      .preview-panel { background: white; display: block; }
      .preview-scroll { padding: 0; display: block; overflow: visible; }
      .quote-doc { display: block; }
      .quote-page { box-shadow: none; width: 100%; min-height: calc(297mm - 2cm); padding: 18px 22px; margin-bottom: 0; break-after: page; page-break-after: always; }
      .quote-page:last-child { break-after: auto; page-break-after: avoid; }
    }
    @page { size: A4; margin: 1cm; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="app-header">
  <div class="hdr-left">
    <img src="sequenovalogo.jpeg" alt="Sequenova Logo" class="hdr-logo-img">
    <div>
      <h1>Sequenova Bill</h1>
      <p>Sequenova Solutions Pvt. Ltd. &nbsp;·&nbsp; Internal Quotation Generator</p>
    </div>
  </div>
  <button class="btn-print" onclick="downloadPDF()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>
</div>

<div class="main">

  <!-- ══════════ LEFT PANEL ══════════ -->
  <div class="form-panel">

    <div class="sec-title">Quote Information</div>
    <div class="frow">
      <div class="fg">
        <label>Date</label>
        <input type="date" id="qDate" oninput="renderPreview()">
      </div>
      <div class="fg">
        <label>Quote No.</label>
        <input type="text" id="qNo" placeholder="SN20260428037" oninput="renderPreview()">
      </div>
    </div>

    <div class="sec-title">Ship To</div>
    <div class="fg">
      <label>Recipient Name / Title</label>
      <input type="text" id="sName" placeholder="e.g. Dr. Subhashree Uppangala" oninput="renderPreview()">
    </div>
    <div class="fg">
      <label>Institution</label>
      <input type="text" id="sInst" placeholder="e.g. Kasturba Medical College (KMC)" oninput="renderPreview()">
    </div>
    <div class="fg">
      <label>Address</label>
      <textarea id="sAddr" placeholder="Full delivery address…" oninput="renderPreview()"></textarea>
    </div>
    <div class="fg">
      <label>Attention</label>
      <input type="text" id="sAttn" placeholder="e.g. Dr. Subhashree Uppangala" oninput="renderPreview()">
    </div>
    <div class="frow">
      <div class="fg">
        <label>Phone</label>
        <input type="text" id="sPhone" placeholder="+91 XXXXXXXXXX" oninput="renderPreview()">
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="email" id="sEmail" placeholder="user@domain.com" oninput="renderPreview()">
      </div>
    </div>

    <div class="sec-title">GST Rates</div>
    <div class="frow">
      <div class="fg">
        <label>SGST %</label>
        <input type="number" id="rSGST" value="0" min="0" max="100" step="0.5" oninput="renderPreview()">
      </div>
      <div class="fg">
        <label>CGST %</label>
        <input type="number" id="rCGST" value="0" min="0" max="100" step="0.5" oninput="renderPreview()">
      </div>
      <div class="fg">
        <label>IGST %</label>
        <input type="number" id="rIGST" value="5" min="0" max="100" step="0.5" oninput="renderPreview()">
      </div>
    </div>

    <div class="sec-title">Transportation</div>
    <div class="frow">
      <div class="fg">
        <label>Transport Cost (₹)</label>
        <input type="number" id="tCost" value="0" min="0" oninput="renderPreview()">
      </div>
      <div class="fg">
        <label>Transport GST %</label>
        <input type="number" id="tGST" value="18" min="0" max="100" oninput="renderPreview()">
      </div>
    </div>

    <div class="sec-title">Line Items</div>
    <div id="itemCards"></div>
    <button class="btn-add" onclick="addItem()">+ Add Item</button>

  </div><!-- /form-panel -->

  <!-- ══════════ PREVIEW PANEL ══════════ -->
  <div class="preview-panel">
    <div class="preview-title-bar">Live Preview</div>
    <div class="preview-scroll">
      <div class="quote-doc" id="preview"></div>
    </div>
  </div>

</div>

<script>
// ── State ──
let items = [];
let nid = 1;

// ── Helpers ──
function $v(id) { return document.getElementById(id)?.value ?? ''; }
function $n(id) { return parseFloat(document.getElementById(id)?.value) || 0; }
function h(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>'); }
function ev(s)  { return String(s||'').replace(/"/g,'&quot;').replace(/&/g,'&amp;'); }
function inr(n) { return '₹ ' + Number(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtD(s){ if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}.${m}.${y}`; }

// ── Number → Indian words ──
const _o=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
  'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
const _t=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
function two(n){ return n<20?_o[n]:_t[Math.floor(n/10)]+(n%10?' '+_o[n%10]:''); }
function n2w(x){
  const n=Math.round(x); if(!n) return 'Zero Only';
  const p=[]; let r=n;
  if(r>=10000000){p.push(two(Math.floor(r/10000000))+' Crore');r%=10000000;}
  if(r>=100000)  {p.push(two(Math.floor(r/100000))+' Lakh');  r%=100000;}
  if(r>=1000)    {p.push(two(Math.floor(r/1000))+' Thousand');r%=1000;}
  if(r>=100)     {p.push(_o[Math.floor(r/100)]+' Hundred');   r%=100;}
  if(r>0)        {p.push(two(r));}
  return 'Rupees '+p.join(' ')+' Only';
}

// ── Item management ──
function addItem() {
  items.push({ id: nid++, cat:'', desc:'', hsn:'', pack:'1 Unit', price:0, qty:1 });
  renderItemCards();
  renderPreview();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItemCards();
  renderPreview();
}

function updateItem(id, field, val) {
  const it = items.find(i => i.id === id);
  if (it) it[field] = val;
  renderPreview();
}

// ── Render item form cards in left panel ──
function renderItemCards() {
  const wrap = document.getElementById('itemCards');
  if (!items.length) {
    wrap.innerHTML = '<p class="empty-msg">No items yet.</p>';
    return;
  }
  wrap.innerHTML = items.map((it, idx) => `
    <div class="item-card">
      <div class="item-card-hdr">
        <span class="item-num">Item ${idx + 1}</span>
        <button class="btn-rem" onclick="removeItem(${it.id})">✕</button>
      </div>
      <div class="frow">
        <div class="fg"><label>Cat. #</label>
          <input type="text" value="${ev(it.cat)}" placeholder="S000277"
            oninput="updateItem(${it.id},'cat',this.value)"></div>
        <div class="fg"><label>HSN Code</label>
          <input type="text" value="${ev(it.hsn)}" placeholder="38221990"
            oninput="updateItem(${it.id},'hsn',this.value)"></div>
      </div>
      <div class="fg"><label>Description</label>
        <input type="text" value="${ev(it.desc)}" placeholder="Product / service description…"
          oninput="updateItem(${it.id},'desc',this.value)"></div>
      <div class="frow">
        <div class="fg"><label>Pack Size</label>
          <input type="text" value="${ev(it.pack)}" placeholder="1 Unit"
            oninput="updateItem(${it.id},'pack',this.value)"></div>
        <div class="fg"><label>Unit Price (₹)</label>
          <input type="number" value="${it.price}" min="0"
            oninput="updateItem(${it.id},'price',parseFloat(this.value)||0)"></div>
        <div class="fg"><label>QTY</label>
          <input type="number" value="${it.qty}" min="0" style="max-width:70px"
            oninput="updateItem(${it.id},'qty',parseFloat(this.value)||0)"></div>
      </div>
    </div>`).join('');
}

// ── Render quotation preview ──
function renderPreview() {
  const qdate = $v('qDate'), qno = $v('qNo').trim() || '—';
  const sr = $n('rSGST'), cr = $n('rCGST'), ir = $n('rIGST');
  const tc = $n('tCost'), tgr = $n('tGST');

  // Ship To
  const sn=$v('sName'), si=$v('sInst'), sa=$v('sAddr'), sat=$v('sAttn'), sp=$v('sPhone'), se=$v('sEmail');
  const shipParts = [
    sn  && `<strong>${h(sn)}</strong>`,
    si  && `<strong>${h(si)}</strong>`,
    sa  && `<div class="info-line"><strong>Address:</strong><span>${h(sa)}</span></div>`,
    sat && `<div class="info-line"><strong>Attention:</strong><span>${h(sat)}</span></div>`,
    sp  && `<div class="info-line"><strong>Phone Number:</strong><span>${h(sp)}</span></div>`,
    se  && `<div class="info-line"><strong>Email:</strong><span>${h(se)}</span></div>`,
  ].filter(Boolean);
  const shipBlock = shipParts.length
    ? shipParts.join('<br>')
    : '<span class="ph">Fill Ship To details in the left panel</span>';

  // Compute totals
  let sub=0, tSG=0, tCG=0, tIG=0, totalQty=0;
  items.forEach(it => {
    const t = it.price * it.qty;
    sub += t; tSG += t*sr/100; tCG += t*cr/100; tIG += t*ir/100; totalQty += it.qty;
  });
  const tgAmt = tc * tgr / 100;
  const grand = sub + tSG + tCG + tIG + tc + tgAmt;

  // Item rows — static display, no inline inputs
  const itemRows = items.length
    ? items.map((it, i) => {
        const total = it.price * it.qty;
        return `<tr class="item-row">
          <td>${i+1}</td>
          <td>${h(it.cat)||'—'}</td>
          <td class="left">${h(it.desc)||'—'}</td>
          <td>${h(it.hsn)||'—'}</td>
          <td>${h(it.pack)||'—'}</td>
          <td>${inr(it.price)}</td>
          <td>${it.qty}</td>
          <td>${inr(total)}</td>
          <td>${inr(total*sr/100)}</td>
          <td>${inr(total*cr/100)}</td>
          <td>${inr(total*ir/100)}</td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="11" style="padding:14px;text-align:center;color:#bbb;font-style:italic">No items — add items using the left panel</td></tr>`;

  document.getElementById('preview').innerHTML = `

    <!-- ══ PAGE 1 ══ -->
    <div class="quote-page">
      <span class="page-label">PAGE 1</span>

      <div class="dh">
        <div class="dh-row1">
          <div class="dh-company">Sequenova Solutions Pvt Ltd</div>
          <div class="dh-title">QUOTATION</div>
          <div class="dh-qno">${h(qno)}</div>
        </div>
        <div class="dh-row2">
          <img src="sequenovalogo.jpeg" alt="Sequenova Logo" class="doc-logo-img">
          <div class="seller-box">
            <div class="seller-name">Sequenova Solutions Private Limited</div>
            <div class="info-line">
              <strong>Address:-</strong>
              <span>108, 1st Floor, Blue Skky Icon, opposite Parvatibai Genba Moze College of Engineering, Baif Road, Sambhaji Nagar, Wagholi, Pune - 412207, Maharashtra, India.</span>
            </div>
            <div class="info-line"><strong>Attention :</strong><span>Ms. Vishakha Gayke</span></div>
            <div class="info-line"><strong>Email:</strong><span>vishakha.gayke@sequenovasolutions.com</span></div>
            <div class="info-line"><strong>GST -</strong><span>27ABNCS3437J1ZV</span></div>
            <div class="info-line"><strong>CIN -</strong><span>U21001PN2024PTC230531</span></div>
          </div>
        </div>
      </div>

      <table class="addr-tbl">
        <thead>
          <tr>
            <th style="width:39%">Bill To</th>
            <th style="width:35%">Ship To</th>
            <th style="width:26%"></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <strong class="bill-company">Anderson Diagnostics Services Pvt. Ltd.</strong>
              <div class="info-line"><strong>Address:</strong><span>No. 150, Poonamallee High Road, (Opp. to Dasaprakash Hotel), Chennai - 600 084, Tamil Nadu, India.</span></div>
              <div class="info-line"><strong>GSTIN:</strong><span>33AAKCA0333K1ZY</span></div>
              <div class="info-line"><strong>Attention:</strong><span>Mrs. M. Vinithra</span></div>
              <div class="info-line"><strong>Phone Number:</strong><span>+91 9176677722</span></div>
              <div class="info-line"><strong>Email:</strong><span>pd@andersondiagnostics.com</span></div>
            </td>
            <td>${shipBlock}</td>

// ── Download PDF ──
function downloadPDF() {
  const qno = (document.getElementById('qNo').value.trim() || 'quotation').replace(/[^a-zA-Z0-9_-]/g, '_');
  const btn = document.querySelector('.btn-print');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  // Clone into an off-screen wrapper with exact A4 width to avoid scroll-container clipping
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:white;';
  const clone = document.getElementById('preview').cloneNode(true);
  clone.style.cssText = 'width:794px;display:block;';
  const clonePages = clone.querySelectorAll('.quote-page');
  clonePages.forEach((p, i) => {
    p.style.width = '794px';
    p.style.minWidth = '794px';
    p.style.margin = '0';
    p.style.boxShadow = 'none';
    if (i < clonePages.length - 1) {
      p.style.pageBreakAfter = 'always';
      p.style.breakAfter = 'page';
    } else {
      p.style.minHeight = 'auto';
      p.style.pageBreakAfter = 'avoid';
      p.style.breakAfter = 'avoid';
    }
  });
  clone.querySelectorAll('.page-label').forEach(el => el.style.display = 'none');
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  html2pdf().set({
    margin: 0,
    filename: qno + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(clone).save().then(() => {
    document.body.removeChild(wrapper);
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF';
  });
}
